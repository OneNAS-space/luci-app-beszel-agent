name: Build luci-app-beszel-agent Package
permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'Makefile'
      - '!**/.github/**'
  workflow_dispatch:

jobs:
  check:
    name: 1. Resolve Version
    runs-on: ubuntu-latest
    outputs:
      resolved_tag: ${{ steps.resolve.outputs.version }}
      pkg_version: ${{ steps.resolve.outputs.pkg_version }}
      pkg_release: ${{ steps.resolve.outputs.pkg_release }}
      should_build: "true"
    steps:
      - name: 🧾 Generate Dynamic Version
        id: resolve
        run: |
          set -euo pipefail

          COMMIT_SHA=$(git rev-parse --short=7 HEAD)

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger detected. Using current time to force unique version."
            BASE_TIMESTAMP=$(date +%s)
          else
            BASE_TIMESTAMP=$(git log -1 --format=%ct)
          fi

          PKG_VERSION_DATE=$(date -u -d "@${BASE_TIMESTAMP}" +'%y.%j')
          PKG_VERSION_SECS=$(printf "%05d" $(( BASE_TIMESTAMP % 86400 )))
          OFFICIAL_VERSION="${PKG_VERSION_DATE}.${PKG_VERSION_SECS}~${COMMIT_SHA}"
          GIT_TAG_VERSION="${PKG_VERSION_DATE}.${PKG_VERSION_SECS}"
          
          echo "Generated version: $GIT_TAG_VERSION"
          echo "version=$GIT_TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "pkg_version=$OFFICIAL_VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: 2. Build for ${{ matrix.version }} / ${{ matrix.target }}
    needs: check
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - version: openwrt-25.12
            target: x86_64
            suffix: noarch

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v7

      - name: 📛 Set Environment
        run: |
          echo "PKG_NAME=${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          echo "ARCH=${{ matrix.target }}-${{ matrix.version }}" >> "$GITHUB_ENV"

      - name: 🧰 Set up luci-app-beszel-agent feed structure
        run: |
          set -e
          mkdir -p package
          printf 'include $(TOPDIR)/feeds/luci/luci.mk\n' > package/luci.mk

          mkdir -p feed/luci/applications/${PKG_NAME}

          mkdir -p feed/luci
          printf 'include $(TOPDIR)/feeds/luci/luci.mk\n' > feed/luci/luci.mk

          rsync -av \
            --exclude='.git' \
            --exclude='feed' \
            --exclude='.github' \
            ./ feed/luci/applications/${PKG_NAME}/

      - name: 🩹 Patch Makefile with dynamic version
        id: patch_version
        run: |
          set -euo pipefail
          V="${{ needs.check.outputs.pkg_version }}"
          MF="feed/luci/applications/${PKG_NAME}/Makefile"

          echo "🚀 Injecting Version: ${V}"

          sed -i '/^PKG_VERSION/d' "$MF"
          sed -i '/^PKG_RELEASE/d' "$MF"
          if grep -q '^PKG_NAME' "$MF"; then
            echo "Found PKG_NAME, inserting after it"
            sed -i "/^PKG_NAME/a PKG_VERSION:=${V}" "$MF"
          elif grep -q '^LUCI_NAME' "$MF"; then
            echo "Found LUCI_NAME, inserting after it"
            sed -i "/^LUCI_NAME/a PKG_VERSION:=${V}" "$MF"
          else
            echo "PKG_VERSION:=${V}" > "$MF.tmp"
            cat "$MF" >> "$MF.tmp"
            mv "$MF.tmp" "$MF"
          fi

      - name: 🏗️ Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v11
        env:
          ARCH: ${{ env.ARCH }}
          FEEDNAME: jackie264
          PACKAGES: ${{ env.PKG_NAME }}
          INDEX: 0
          FEED_DIR: ${{ github.workspace }}/feed
          NO_SHFMT_CHECK: 1
          NO_REFRESH_CHECK: 1
          
      - name: 🔍 Debug build output
        run: |
          echo "=== bin directory structure ==="
          ls -la bin/ 2>/dev/null || echo "No bin directory found"
          if [ -d "bin/packages" ]; then
            echo "=== Full packages directory tree ==="
            ls -laR bin/packages/ 2>/dev/null || echo "No packages directory"
          fi

      - name: 📦 Upload artifact for ${{ matrix.target }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PKG_NAME }}-${{ matrix.target }}-${{ matrix.version }}
          path: |
            bin/packages/*/jackie264/${{ env.PKG_NAME }}*.apk
          if-no-files-found: ignore

  release:
    name: 3. Release & Deploy ${{ github.repository }}
    needs: [check, build]
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v7

      - name: ⬇️ Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-assets

      - name: 🗃️ Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.check.outputs.resolved_tag }}
          name: Build-${{ needs.check.outputs.resolved_tag }}
          files: |
            ./release-assets/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔑 Checkout custom-packages repo
        uses: actions/checkout@v7
        with:
          repository: OneNAS-space/custom-packages
          token: ${{ secrets.CUSTOM_PACKAGES_TOKEN }}
          path: custom-packages

      - name: 🚚 Update luci artifacts
        run: |
          set -e
          CURRENT_PKG="${{ github.event.repository.name }}"
          TARGET_DIR="custom-packages/releases/packages-25.12/luci"
          mkdir -p "$TARGET_DIR"
          
          echo "Cleaning all old versions for $CURRENT_PKG in $TARGET_DIR..."
          rm -f "$TARGET_DIR/${CURRENT_PKG}"-*.apk
          
          find ./release-assets -type f -name "*.apk" | while read -r f; do
            echo "Deploying $(basename "$f") to $TARGET_DIR/"
            cp "$f" "$TARGET_DIR/"
          done
          
          echo "=== 25.12 Content ==="
          ls -la "$TARGET_DIR/${CURRENT_PKG}"* || echo "No APKs found"

          cd custom-packages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "releases/packages-25.12/luci/"
          git commit -m "Update $CURRENT_PKG to ${{ needs.check.outputs.resolved_tag }}" || echo "No changes"
          
          for i in {1..5}; do
            git pull --rebase origin main && \
            git push origin main && break || \
            (echo "Conflict detected, retrying in 5s..." && sleep 5)
          done
